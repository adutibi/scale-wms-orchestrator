services:
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: scale
      RABBITMQ_DEFAULT_PASS: scale_secret
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    ports:
      - "3000:3000"
    environment:
      RABBITMQ_URL: amqp://scale:scale_secret@rabbitmq:5672
      ORCHESTRATOR_PORT: 3000
      ORCHESTRATOR_REPLY_PREFETCH: 50
      # Bearer token validation (empty = disabled). Reads from .env.
      AUTH_APP_ID: ${AUTH_APP_ID:-}
      # Per-request audit events to logging-service ("false" = off)
      AUDIT_LOG_ENABLED: ${AUDIT_LOG_ENABLED:-true}
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  logging-service:
    build: ./logging-service
    ports:
      - "9100:9100" # /metrics
    environment:
      RABBITMQ_URL: amqp://scale:scale_secret@rabbitmq:5672
      LOGGING_PREFETCH: 20
      # Observability toggles
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_PORT: 9100
      QUEUE_MONITOR_ENABLED: ${QUEUE_MONITOR_ENABLED:-true}
      QUEUE_DEPTH_WARN_THRESHOLD: ${QUEUE_DEPTH_WARN_THRESHOLD:-100}
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker-service:
    build:
      context: .
      dockerfile: worker-service/Dockerfile
    env_file:
      - .env
    environment:
      RABBITMQ_URL: amqp://scale:scale_secret@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
